name: Build APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Full history (not the default shallow depth-1 clone) so the commit-message step below
      # can walk back to the previous release tag.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # versionCode must strictly increase for update checkers (Obtainium, Android itself) to
      # recognize a new build; run_number does that automatically across pushes to this repo.
      # Release (not debug) is what's shipped — it's R8-minified and resource-shrunk, and reuses
      # the same pinned debug.keystore signing key (see app/build.gradle.kts) so in-place updates
      # still work.
      - name: Build release APK
        run: ./gradlew assembleRelease -PappVersionCode=${{ github.run_number }} -PappVersionName=1.0.${{ github.run_number }}

      # A second, human-readable copy of the same APK alongside the original app-release.apk —
      # not a replacement. Keeping app-release.apk's name unchanged is what lets
      # .../releases/latest/download/app-release.apk stay a fixed, version-less URL that always
      # resolves to the newest build (bookmark/QR code/Obtainium-friendly); the versioned copy is
      # for humans browsing the release page who want the version visible in the filename itself.
      - name: Add versioned copy of the APK
        run: cp app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/Ownscreen-v1.0.${{ github.run_number }}.apk"

      # Downloadable from the Actions tab for this specific run (kept for ~90 days).
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ownscreen-release-apk
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/Ownscreen-v1.0.${{ github.run_number }}.apk

      # Release body lists the title of every commit since the last release tag (falling back to
      # the full history if this is the first release), so release notes describe everything that
      # shipped instead of just the HEAD commit.
      - name: Get commit messages since last release
        id: commit_message
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          RANGE="${LAST_TAG:+$LAST_TAG..}HEAD"
          {
            echo 'message<<EOF'
            git log "$RANGE" --pretty='- %s'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      # Each push gets its own tag/release (rather than overwriting one shared "latest" release)
      # so update checkers like Obtainium — which detect new versions by tag, not by inspecting
      # the APK — actually see a new version on every build. GitHub's own generated
      # ".../releases/latest/download/app-release.apk" URL still always resolves to whichever
      # release is newest, so this doesn't lose the stable permanent-download-link use case.
      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          body: ${{ steps.commit_message.outputs.message }}
          artifacts: "app/build/outputs/apk/release/app-release.apk,app/build/outputs/apk/release/Ownscreen-v1.0.${{ github.run_number }}.apk"
          prerelease: false
